name: Flutter CI

on:
  push:
    branches: [master]
    paths:
      - 'flutter_dashboard/**'
  pull_request:
    branches: [master]
    paths:
      - 'flutter_dashboard/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test
