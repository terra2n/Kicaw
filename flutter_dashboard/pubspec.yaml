name: dashboard_eco2
description: Smart Room eCO2 Monitoring - ESP32 + Flutter + Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_database: ^10.4.0
  cloud_firestore: ^4.13.5
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.1.0
  # Supabase
  supabase_flutter: ^2.3.0
  # Environment variables
  flutter_dotenv: ^5.1.0
  flutter_blue_plus: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
